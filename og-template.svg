<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#020617"/>
  <!-- Ambient Glow -->
  <circle cx="600" cy="315" r="500" fill="url(#glowGradient)" opacity="0.15"/>
  <defs>
    <radialGradient id="glowGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 315) rotate(90) scale(400)">
      <stop stop-color="#FF5E5E"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fullRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5E5E;stop-opacity:1" />
      <stop offset="15%" style="stop-color:#FFA25C;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#FFD95C;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#5EFF8B;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#5EB1FF;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#7A5EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D95EFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g transform="translate(470, 150) scale(0.5)">
    <circle cx="256" cy="360" r="72" fill="url(#fullRainbow)"/>
    <path d="M126 360C126 288.203 184.203 230 256 230C327.797 230 386 288.203 386 360" stroke="url(#fullRainbow)" stroke-width="44" stroke-linecap="round"/>
    <path d="M56 360C56 249.543 145.543 160 256 160C366.457 160 456 249.543 456 360" stroke="url(#fullRainbow)" stroke-width="44" stroke-linecap="round"/>
  </g>
  
  <text x="600" y="480" text-anchor="middle" fill="white" style="font-family: sans-serif; font-size: 80px; font-weight: 800; letter-spacing: -2px;">TapSay</text>
  <text x="600" y="540" text-anchor="middle" fill="rgba(255,255,255,0.6)" style="font-family: sans-serif; font-size: 32px; font-weight: 600;">Speed is the New Language</text>
</svg>
